<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gen8 Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#f97316; --primary-2:#e05a1a; --primary-muted:rgba(249,115,22,.08); --primary-border:rgba(249,115,22,.35);
      --bg:#f6f8fb; --surface:#ffffff;
      --text:#0f172a; --muted:#475569; --faint:#94a3b8;
      --border:rgba(15,23,42,.10); --border-strong:rgba(15,23,42,.18);
      --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --shadow-md:0 8px 28px rgba(15,23,42,.08);
      --radius:16px;
    }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.6;}
    .topbar{height:4px;background:linear-gradient(90deg,var(--primary),var(--primary-2));}
    .wrap{max-width:860px;margin:0 auto;padding:0 24px;}
    header{padding:56px 0 28px;}
    .brand{display:inline-flex;align-items:center;gap:10px;font-weight:900;font-size:15px;letter-spacing:.02em;color:var(--text);}
    .brand .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary-2));box-shadow:0 4px 12px var(--primary-border);}
    h1{font-size:40px;line-height:1.15;font-weight:900;margin:20px 0 8px;letter-spacing:-.02em;}
    h1 .grad{background:linear-gradient(90deg,var(--primary),var(--primary-2));-webkit-background-clip:text;background-clip:text;color:transparent;}
    .sub{color:var(--muted);font-size:17px;margin:0;max-width:560px;}
    main{padding:8px 0 48px;}
    .section-label{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 14px;}
    .section-label::after{content:"";flex:1;height:1px;background:var(--border);}
    .posts{list-style:none;padding:0;margin:0;display:grid;gap:14px;}
    .post{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;}
    .post:hover{transform:translateY(-2px);border-color:var(--primary-border);box-shadow:var(--shadow-md);}
    .post a{color:var(--text);text-decoration:none;font-weight:800;font-size:19px;letter-spacing:-.01em;}
    .post:hover a{color:var(--primary);}
    .post .meta{color:var(--faint);font-size:13px;margin-top:6px;display:flex;align-items:center;gap:8px;}
    .pill{display:inline-block;background:var(--primary-muted);color:var(--primary);border:1px solid var(--primary-border);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:700;}
    .empty{color:var(--muted);background:var(--surface);border:1px dashed var(--border-strong);border-radius:var(--radius);padding:28px;text-align:center;}
    footer{border-top:1px solid var(--border);padding:24px 0 48px;color:var(--faint);font-size:13px;}
    footer b{color:var(--muted);}
  </style>
</head>
<body>
  <div class="topbar"></div>
  <div class="wrap">
    <header>
      <span class="brand"><span class="mark"></span> GEN<span style="color:var(--primary)">8</span> INSIGHTS</span>
      <h1>Ideas on <span class="grad">AI agents &amp; automation</span></h1>
      <p class="sub">Researched, written, and human‑approved — then published automatically by our GenFlow content workflow.</p>
    </header>

    <main>
      <div class="section-label">Latest posts</div>
      <ul class="posts" id="posts"><li class="empty">Loading posts…</li></ul>
    </main>

    <footer>Built on <b>GenFlow</b> — AI generates the draft, a human approves it in chat, and it ships here.</footer>
  </div>

  <script>
    const REPO = 'Karishma-devani/blog';
    const el = document.getElementById('posts');
    fetch(`https://api.github.com/repos/${REPO}/contents/posts`)
      .then(r => r.ok ? r.json() : [])
      .then(files => {
        const posts = (files || []).filter(f => f.name.endsWith('.html')).sort((a,b)=>b.name.localeCompare(a.name));
        if(!posts.length){ el.innerHTML = '<li class="empty">No posts yet — publish one from the workflow and refresh.</li>'; return; }
        el.innerHTML = posts.map(f => {
          const title = f.name.replace(/\.html$/,'').replace(/^post-/,'Post ').replace(/[-_]/g,' ');
          return `<li class="post"><a href="posts/${f.name}">${title}</a><div class="meta"><span class="pill">Published</span> ${f.name}</div></li>`;
        }).join('');
      })
      .catch(()=>{ el.innerHTML = '<li class="empty">Could not load posts.</li>'; });
  </script>
</body>
</html>
