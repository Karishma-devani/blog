<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gen8 Insights</title>
  <style>
    :root { --bg:#0b0f1a; --card:#121829; --text:#e8edf6; --muted:#93a0b8; --accent:#ff7a18; --line:#1e2740; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:16px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    header { max-width:820px; margin:0 auto; padding:64px 24px 24px; }
    .brand { display:inline-flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.02em; }
    .brand .dot { width:12px; height:12px; border-radius:4px; background:var(--accent); }
    h1 { font-size:34px; margin:18px 0 6px; }
    .sub { color:var(--muted); margin:0; }
    main { max-width:820px; margin:0 auto; padding:24px; }
    .posts { list-style:none; padding:0; margin:24px 0; display:grid; gap:14px; }
    .post { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px; transition:.15s; }
    .post:hover { border-color:var(--accent); transform:translateY(-1px); }
    .post a { color:var(--text); text-decoration:none; font-weight:700; font-size:18px; }
    .post .meta { color:var(--muted); font-size:13px; margin-top:4px; }
    .empty { color:var(--muted); }
    footer { max-width:820px; margin:0 auto; padding:24px; color:var(--muted); font-size:13px; border-top:1px solid var(--line); }
  </style>
</head>
<body>
  <header>
    <span class="brand"><span class="dot"></span> Gen8 Insights</span>
    <h1>Ideas on AI agents &amp; automation</h1>
    <p class="sub">Published automatically by our content workflow.</p>
  </header>
  <main>
    <ul class="posts" id="posts"><li class="empty">Loading posts…</li></ul>
  </main>
  <footer>Built on GenFlow. Posts are generated, human‑approved, then published here.</footer>

  <!-- Auto-lists files in /posts via the public GitHub API. Replace USER/REPO below. -->
  <script>
    const REPO = 'Karishma-devani/blog'; // e.g. 'karishma/blog'
    const el = document.getElementById('posts');
    fetch(`https://api.github.com/repos/${REPO}/contents/posts`)
      .then(r => r.ok ? r.json() : [])
      .then(files => {
        const posts = (files || []).filter(f => f.name.endsWith('.html'))
          .sort((a,b) => b.name.localeCompare(a.name));
        if (!posts.length) { el.innerHTML = '<li class="empty">No posts yet — publish one from the workflow.</li>'; return; }
        el.innerHTML = posts.map(f => {
          const title = f.name.replace(/\.html$/,'').replace(/^post-/,'Post ').replace(/[-_]/g,' ');
          return `<li class="post"><a href="posts/${f.name}">${title}</a><div class="meta">${f.name}</div></li>`;
        }).join('');
      })
      .catch(() => { el.innerHTML = '<li class="empty">Could not load posts.</li>'; });
  </script>
</body>
</html>
